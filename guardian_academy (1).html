<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian Academy — แพลตฟอร์มเรียนรู้ไซเบอร์ครบวงจร</title>
<style>
  :root{
    --bg:#060814;--glass:rgba(16,22,42,.72);--glass2:rgba(22,30,56,.55);
    --line:rgba(90,130,200,.25);--line2:rgba(120,160,230,.45);
    --txt:#e8f0ff;--dim:#8a9bc0;--dim2:#4a5878;
    --green:#2bffb0;--red:#ff4d6d;--amber:#ffc046;--cyan:#3de1ff;--purple:#c06bff;--pink:#ff6bd6;
    --accent:#3de1ff;--accent-rgb:61,225,255;--accent2:#6b8bff;
    --mono:'SF Mono','JetBrains Mono','Cascadia Code','Courier New',monospace;
    --display:'Segoe UI','SF Pro Display','Helvetica Neue',system-ui,sans-serif;
    --thai:'IBM Plex Sans Thai','Leelawadee UI','Sukhumvit Set','Tahoma',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}html,body{min-height:100%}
  body{background:var(--bg);color:var(--txt);font-family:var(--thai);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;overflow-x:hidden;position:relative}
  #bgCanvas{position:fixed;inset:0;z-index:-3}
  body::before{content:"";position:fixed;inset:0;z-index:-2;transition:background .8s;
    background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(var(--accent-rgb),.16),transparent 60%),radial-gradient(ellipse 60% 50% at 50% 110%,rgba(107,139,255,.12),transparent 60%),linear-gradient(180deg,#070a18 0%,#060814 60%,#04060f 100%)}
  #stage{width:100%;max-width:940px;perspective:1600px}
  #app{position:relative;border-radius:20px;overflow:hidden;background:var(--glass);backdrop-filter:blur(20px) saturate(1.3);border:1px solid var(--line2);box-shadow:0 0 0 1px rgba(var(--accent-rgb),.08),0 0 80px rgba(var(--accent-rgb),.08),0 40px 100px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.08)}
  #app.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  .topglow{position:absolute;top:0;left:0;right:0;height:2px;z-index:5;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);opacity:.8;animation:sweep 4s ease-in-out infinite}
  @keyframes sweep{0%,100%{opacity:.3;transform:translateX(-30%)}50%{opacity:.9;transform:translateX(30%)}}
  .mono{font-family:var(--mono)}
  .gradtext{background:linear-gradient(135deg,#fff 10%,var(--accent) 50%,var(--accent2) 90%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .fade{animation:fade .5s cubic-bezier(.2,.8,.2,1) both}
  @keyframes fade{from{opacity:0;transform:translateY(16px) scale(.99)}to{opacity:1;transform:none}}
  .pop{animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  .reveal{animation:reveal .8s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes reveal{0%{opacity:0;transform:scale(.3) rotate(-12deg)}60%{transform:scale(1.15) rotate(4deg)}100%{opacity:1;transform:scale(1)}}
  .stagger>*{opacity:0;animation:fade .5s cubic-bezier(.2,.8,.2,1) forwards}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.13s}.stagger>*:nth-child(3){animation-delay:.21s}.stagger>*:nth-child(4){animation-delay:.29s}.stagger>*:nth-child(5){animation-delay:.37s}.stagger>*:nth-child(6){animation-delay:.45s}.stagger>*:nth-child(7){animation-delay:.53s}
  .screen{padding:34px 32px}@media(max-width:560px){.screen{padding:22px 16px}}
  .btn{font-family:var(--mono);cursor:pointer;border-radius:12px;letter-spacing:.5px;transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,background .25s;user-select:none;position:relative;overflow:hidden;border:none}
  .btn::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.18),transparent 70%);transform:translateX(-120%);transition:transform .6s}
  .btn:hover::after{transform:translateX(120%)}.btn:active{transform:scale(.96)}.btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  .btn-main{display:block;width:100%;padding:16px;font-size:.94rem;font-weight:700;color:#041018;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 28px rgba(var(--accent-rgb),.35),inset 0 1px 0 rgba(255,255,255,.4)}
  .btn-main:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(var(--accent-rgb),.5)}
  .btn-ghost{display:block;width:100%;padding:13px;font-size:.81rem;font-weight:600;color:var(--dim);background:var(--glass2);border:1px solid var(--line)}
  .btn-ghost:hover{color:var(--txt);border-color:var(--line2);background:rgba(40,55,95,.5)}
  .kicker{font-family:var(--mono);font-size:.69rem;letter-spacing:5px;color:var(--accent);text-align:center;text-transform:uppercase;opacity:.85;margin-bottom:6px}
  .logo{font-family:var(--display);font-weight:800;text-align:center;line-height:.92;font-size:clamp(40px,10vw,74px);letter-spacing:-2px;margin:8px 0;filter:drop-shadow(0 4px 30px rgba(var(--accent-rgb),.4))}
  .tagline{text-align:center;font-family:var(--mono);font-size:.75rem;letter-spacing:3px;color:var(--dim);margin:12px 0 22px}
  .glasscard{background:var(--glass2);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px;position:relative;overflow:hidden}
  .glasscard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--accent),var(--accent2))}
  .glasscard h3{font-family:var(--mono);color:var(--accent);font-size:.69rem;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
  .glasscard p{font-size:.875rem;line-height:1.75;color:var(--dim)}.glasscard b{color:var(--txt)}
  .field-lbl{font-family:var(--mono);font-size:.63rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;display:block}
  .inp{font-family:var(--thai);width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:12px;background:rgba(8,12,26,.6);color:var(--txt);font-size:.875rem;transition:.2s;margin-bottom:14px}
  .inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.15)}.inp::placeholder{color:var(--dim2)}
  .seg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .seg .opt{flex:1;min-width:74px;font-family:var(--mono);font-size:.72rem;padding:11px;border-radius:11px;cursor:pointer;text-align:center;background:rgba(8,12,26,.5);border:1px solid var(--line);color:var(--dim);transition:.2s}
  .seg .opt:hover{border-color:var(--line2)}.seg .opt.on{background:linear-gradient(135deg,rgba(var(--accent-rgb),.2),rgba(107,139,255,.12));border-color:var(--accent);color:var(--accent);box-shadow:0 4px 16px rgba(var(--accent-rgb),.2)}
  .chk{display:flex;align-items:flex-start;gap:11px;cursor:pointer;padding:10px;border-radius:11px;border:1px solid var(--line);background:rgba(8,12,26,.4);transition:.2s;margin-bottom:10px}
  .chk:hover{border-color:var(--line2)}.chk.on{border-color:var(--green);background:rgba(43,255,176,.06)}
  .chk .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;margin-top:1px}
  .chk.on .box{border-color:var(--green);background:var(--green);color:#04140d}.chk .lbl{font-size:.81rem;line-height:1.55}
  .nav-tabs{display:flex;gap:8px;flex-wrap:wrap}
  .nav-tabs .tab{flex:1;min-width:88px;font-family:var(--mono);font-size:.69rem;padding:10px;border-radius:10px;cursor:pointer;text-align:center;background:var(--glass2);border:1px solid var(--line);color:var(--dim);transition:.2s}
  .nav-tabs .tab:hover{border-color:var(--line2);color:var(--txt)}
  .lvlcard{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:16px;cursor:pointer;margin-bottom:13px;border:1px solid var(--line);background:var(--glass2);transition:.25s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden}
  .lvlcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);box-shadow:0 0 18px var(--c)}
  .lvlcard:hover{transform:translateX(6px) scale(1.01);border-color:var(--c);box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .lvlcard.lock{opacity:.4;cursor:not-allowed;filter:grayscale(.7)}.lvlcard.lock:hover{transform:none}.lvlcard.boss{border-style:dashed}
  .lvlcard .ico{font-size:34px;min-width:52px;text-align:center;filter:drop-shadow(0 0 12px var(--c))}
  .lvlcard h4{font-family:var(--display);font-size:1.1rem;font-weight:700;margin-bottom:3px}.lvlcard .sub{font-size:.75rem;color:var(--dim)}
  .lvlcard .rk{margin-left:auto;font-family:var(--mono);font-size:.81rem;font-weight:700;padding:6px 12px;border-radius:10px;border:1px solid var(--line2);color:var(--dim)}
  .lvlcard .rk.has{color:var(--c);border-color:var(--c)}
  .hud{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 18px;background:rgba(6,9,20,.65);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:.66rem}
  .hud .tag{color:var(--accent);font-weight:700;letter-spacing:.5px}.hud .spacer{flex:1}
  .meter{display:flex;align-items:center;gap:6px}.meter .lab{color:var(--dim);font-size:.56rem}
  .bar{width:74px;height:8px;background:rgba(8,16,28,.8);border-radius:6px;overflow:hidden;position:relative}
  .bar>i{display:block;height:100%;border-radius:6px;transition:width .5s cubic-bezier(.2,.8,.2,1);position:relative;overflow:hidden}
  .bar>i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s linear infinite}
  @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
  .pct{font-weight:700;font-size:.75rem}
  .chip{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:8px;background:rgba(8,16,28,.6);border:1px solid var(--line)}
  .chip.tok{color:var(--cyan)}.chip.streak{color:var(--amber)}
  .streak.hot{animation:flame .5s infinite alternate;text-shadow:0 0 10px var(--amber)}
  @keyframes flame{to{transform:scale(1.12)}}
  .iconbtn{cursor:pointer;background:none;border:none;color:var(--dim);font-size:.9rem;transition:.2s;padding:3px}
  .iconbtn:hover{color:var(--accent);transform:scale(1.15)}
  .timer{font-weight:700;font-size:.9rem;color:var(--amber);min-width:46px;text-align:right}.timer.low{color:var(--red);animation:pulse .6s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .game{display:grid;grid-template-columns:1.5fr 1fr;min-height:380px}@media(max-width:680px){.game{grid-template-columns:1fr}}
  .evidence{border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:11px}@media(max-width:680px){.evidence{border-right:none;border-bottom:1px solid var(--line)}}
  .plabel{font-family:var(--mono);font-size:.63rem;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .plabel::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
  .sc-title{font-family:var(--display);font-size:1.04rem;font-weight:700}.sc-sub{font-size:.78rem;color:var(--dim);line-height:1.6}
  .viewport{position:relative;background:radial-gradient(circle at 50% 40%,#0a1424,#040810);border:1px solid var(--line);border-radius:14px;min-height:190px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 0 40px rgba(var(--accent-rgb),.08)}
  .viewport .scan{position:absolute;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(var(--accent-rgb),.12),transparent);animation:scanY 3s ease-in-out infinite}
  @keyframes scanY{0%{top:-60px}100%{top:100%}}
  .corner{position:absolute;width:15px;height:15px;border:2px solid var(--accent);opacity:.7}
  .corner.tl{top:9px;left:9px;border-right:0;border-bottom:0}.corner.tr{top:9px;right:9px;border-left:0;border-bottom:0}.corner.bl{bottom:9px;left:9px;border-right:0;border-top:0}.corner.br{bottom:9px;right:9px;border-left:0;border-top:0}
  .anomaly{opacity:0;transition:opacity .4s}.viewport.inspect .anomaly{opacity:1}
  .uimg{max-width:100%;max-height:180px;border-radius:8px;position:relative;z-index:1}
  .datacard{background:rgba(8,14,28,.6);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:.78rem}
  .datarow{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(90,130,200,.1)}.datarow:last-child{border:0}
  .datarow .k{color:var(--dim);min-width:84px;font-family:var(--mono);font-size:.66rem}.datarow .v{color:var(--txt);flex:1}
  .msgbox{background:rgba(4,8,16,.7);border-radius:9px;padding:9px 11px;color:#bcd4e8;font-size:.78rem;line-height:1.6;margin:7px 0}
  .urlbox{background:#04080f;border:1px solid var(--line);border-radius:8px;padding:9px;font-family:var(--mono);font-size:.69rem;word-break:break-all;line-height:1.8}
  .u-dim{color:#5a7088}.u-warn{color:var(--amber);border-bottom:1px dashed var(--amber)}.u-bad{color:var(--red);background:rgba(255,77,109,.12);padding:1px 4px;border-radius:3px}.u-ok{color:var(--green)}
  .verifyrow{display:flex;gap:7px;flex-wrap:wrap}
  .vbtn{flex:1;min-width:96px;font-family:var(--mono);font-size:.66rem;padding:9px 6px;border-radius:10px;cursor:pointer;background:rgba(8,16,28,.6);border:1px solid var(--line);color:var(--accent);transition:.2s;text-align:center}
  .vbtn:hover{background:rgba(var(--accent-rgb),.1);border-color:var(--accent)}.vbtn.active{background:rgba(var(--accent-rgb),.16);border-color:var(--accent)}
  .vbtn:disabled{opacity:.35;cursor:not-allowed}.vbtn .cost{display:block;font-size:.56rem;opacity:.7;margin-top:2px}
  .vbtn.src{color:var(--green);border-color:rgba(43,255,176,.3)}.vbtn.src:hover{background:rgba(43,255,176,.1)}
  .clues{display:flex;flex-wrap:wrap;gap:6px;min-height:16px}
  .clue{font-size:.63rem;padding:4px 9px;border-radius:6px;font-family:var(--mono);background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.4);color:#ff8fa3;opacity:0;transform:translateY(6px) scale(.9);transition:.35s cubic-bezier(.34,1.56,.64,1)}
  .clue.show{opacity:1;transform:none}
  .srcbox{background:rgba(43,255,176,.08);border:1px solid rgba(43,255,176,.4);border-radius:9px;padding:9px 11px;font-size:.72rem;color:#bff5e2;line-height:1.55;animation:bub .4s both}
  .chat{padding:18px;display:flex;flex-direction:column;gap:9px;min-height:380px}
  .chat .plabel{color:var(--green)}.chat .plabel::before{background:var(--green);box-shadow:0 0 8px var(--green)}
  .chatwin{flex:1;background:rgba(4,12,10,.5);border:1px solid rgba(43,255,176,.2);border-radius:14px;padding:11px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:250px;min-height:150px}
  .chatwin::-webkit-scrollbar{width:5px}.chatwin::-webkit-scrollbar-thumb{background:rgba(43,255,176,.3);border-radius:3px}
  .bub{max-width:90%;padding:8px 12px;border-radius:13px;font-size:.76rem;line-height:1.5;animation:bub .35s cubic-bezier(.2,.8,.2,1) both}
  @keyframes bub{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
  .bub.bot{align-self:flex-start;background:rgba(43,255,176,.1);border:1px solid rgba(43,255,176,.25);color:#c8f5e4;border-bottom-left-radius:4px}
  .bub.me{align-self:flex-end;background:rgba(var(--accent-rgb),.14);border:1px solid rgba(var(--accent-rgb),.3);color:#d6f3ff;border-bottom-right-radius:4px}
  .bub .who{font-family:var(--mono);font-size:.56rem;opacity:.7;margin-bottom:3px}
  .typing{align-self:flex-start;display:flex;gap:4px;padding:10px 13px;background:rgba(43,255,176,.08);border-radius:13px}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--green);animation:typ 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes typ{0%,60%,100%{opacity:.3}30%{opacity:1;transform:translateY(-4px)}}
  .chatform{display:flex;gap:7px}
  .chatin{flex:1;font-family:var(--thai);padding:10px 13px;border:1px solid rgba(43,255,176,.25);border-radius:11px;background:rgba(4,12,10,.6);color:var(--txt);font-size:.78rem}
  .chatin:focus{outline:none;border-color:var(--green)}
  .chatsend{font-family:var(--mono);padding:0 15px;border-radius:11px;cursor:pointer;border:1px solid var(--green);background:rgba(43,255,176,.12);color:var(--green);font-weight:700}
  .quickbtn{font-family:var(--mono);font-size:.63rem;padding:6px 9px;border-radius:8px;cursor:pointer;background:rgba(43,255,176,.08);border:1px solid rgba(43,255,176,.25);color:#9fe6cf;white-space:nowrap}
  .quickbtn:hover{background:rgba(43,255,176,.18)}
  .actions{background:rgba(6,9,20,.65);border-top:1px solid var(--line);padding:15px 18px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
  .actions .prompt{font-family:var(--mono);font-size:.69rem;color:var(--dim);letter-spacing:1px;width:100%;text-align:center;text-transform:uppercase}
  .abtn{font-family:var(--mono);padding:12px 22px;font-size:.81rem;font-weight:700;letter-spacing:.5px;border-radius:12px;cursor:pointer;transition:.18s cubic-bezier(.34,1.56,.64,1);border:2px solid;background:transparent;display:flex;align-items:center;gap:6px}
  .abtn:hover{transform:translateY(-3px)}.abtn:active{transform:translateY(0)}.abtn:focus-visible{outline:3px solid currentColor;outline-offset:2px}
  .abtn .kb{font-size:.56rem;opacity:.6;border:1px solid currentColor;border-radius:4px;padding:0 4px}
  .a-green{border-color:var(--green);color:var(--green)}.a-green:hover{background:rgba(43,255,176,.12)}
  .a-red{border-color:var(--red);color:var(--red)}.a-red:hover{background:rgba(255,77,109,.12)}
  .a-amber{border-color:var(--amber);color:var(--amber)}.a-amber:hover{background:rgba(255,192,70,.12)}
  .lockwrap{padding:30px 28px;text-align:center}
  .lockq{font-family:var(--display);font-size:1.2rem;font-weight:700;margin-bottom:6px}
  .locksub{font-size:.78rem;color:var(--dim);margin-bottom:18px}
  .eopt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:13px 15px;border-radius:12px;margin-bottom:9px;background:var(--glass2);border:1px solid var(--line);color:var(--txt);font-family:var(--thai);font-size:.82rem;cursor:pointer;transition:.2s}
  .eopt:hover{border-color:var(--accent);transform:translateX(4px)}.eopt:focus-visible{outline:3px solid var(--accent)}
  .eopt .ek{font-family:var(--mono);font-weight:700;color:var(--accent);border:1px solid var(--line2);border-radius:6px;padding:2px 8px;font-size:.72rem}
  .eopt.right{border-color:var(--green);background:rgba(43,255,176,.1)}.eopt.wrong{border-color:var(--red);background:rgba(255,77,109,.1)}
  .feedback{padding:32px 28px;text-align:center}
  .fbv{font-family:var(--display);font-size:1.8rem;font-weight:800;margin-bottom:8px}
  .fbv.ok{color:var(--green);text-shadow:0 0 30px rgba(43,255,176,.4)}.fbv.no{color:var(--red);text-shadow:0 0 30px rgba(255,77,109,.4)}
  .fbtruth{font-family:var(--mono);font-size:.81rem;color:var(--amber);margin-bottom:10px}
  .fbmeters{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
  .fbm{font-family:var(--mono);font-size:.75rem;padding:6px 12px;border-radius:9px;border:1px solid var(--line)}
  .fbex{background:var(--glass2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;font-size:.875rem;line-height:1.75;text-align:left;margin-bottom:20px;position:relative;overflow:hidden}
  .fbex::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}.fbex b{color:var(--accent)}
  .casc{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.4);border-radius:14px;padding:18px 20px;text-align:left;margin-bottom:18px}
  .casc h3{font-family:var(--mono);color:var(--red);font-size:.75rem;letter-spacing:1px;margin-bottom:8px}

  const r=best.r[Math.floor(Math.random()*best.r.length)];
  if(r==="__HINT__"){if(state.tokens<CONFIG.cost.hint)return "token หมดแล้วครับ 😅 ลองทบทวนเบาะแสที่มีแล้วตัดสินใจเลย!";
    const s=cur();if(state.hints>=s.hi.length)return "ผมใบ้ครบแล้วครับ ทบทวนหลักฐานแล้วตัดสินใจเลย!";
    state.tokens-=CONFIG.cost.hint;updTokens();const h=s.hi[state.hints];state.hints++;state.noHint=false;
    return "💡 (ใช้ 1 token) คำใบ้: "+h;}
  return r;}

  setTimeout(function(){state.qIdx++;if(state.qIdx>=QUIZ.length)endQuiz();else renderQuiz();},850);}

function botSay(t){const w=document.getElementById("chatwin");if(!w)return;const d=document.createElement("div");d.className="bub bot";d.innerHTML='<div class="who">น้องคำนวณ</div>'+t;w.appendChild(d);w.scrollTop=w.scrollHeight;sfx("msg");}

function think(cb){const w=document.getElementById("chatwin");if(!w){cb();return;}const t=document.createElement("div");t.className="typing";t.innerHTML="<span></span><span></span><span></span>";w.appendChild(t);w.scrollTop=w.scrollHeight;setTimeout(function(){t.remove();cb();},550+Math.random()*350);}

function updTokens(){const t=document.getElementById("tok");if(t)t.textContent="🔅 "+state.tokens;}

function doInspect(){if(state.answered||state.inspect)return;if(state.tokens<CONFIG.cost.inspect){toast("🔅","token หมด — ต้องตัดสินด้วยข้อมูลที่มี");return;}
  state.tokens-=CONFIG.cost.inspect;updTokens();state.inspect=true;sfx("inspect");const s=cur(),btn=document.getElementById("inspectBtn"),box=document.getElementById("clues"),vp=document.getElementById("viewport");
  if(vp)vp.classList.add("inspect");btn.classList.add("active");btn.disabled=true;
  box.innerHTML=s.cl.map(c=>'<span class="clue">● '+c+'</span>').join("");[].forEach.call(box.children,(el,i)=>setTimeout(()=>el.classList.add("show"),100*i));}
function doCross(){if(state.answered||state.crossed)return;if(state.tokens<CONFIG.cost.cross){toast("🔅","token ไม่พอ (ต้องใช้ 2)");return;}
  state.tokens-=CONFIG.cost.cross;updTokens();state.crossed=true;sfx("inspect");const s=cur(),mech=curMech(),btn=document.getElementById("crossBtn");btn.classList.add("active");btn.disabled=true;
  let txt;if(mech==="b2")txt=s.an==="DEEPFAKE"?"🌐 ตรวจแหล่ง: ไม่พบสำนักข่าว/ช่องทางทางการยืนยันเรื่องนี้เลย — น่าสงสัยอย่างยิ่ง":"🌐 ตรวจแหล่ง: พบหลายแหล่งน่าเชื่อถือรายงานตรงกัน — สนับสนุนว่าเป็นของจริง";
  else if(mech==="phish")txt="🌐 ตรวจ Domain จริง: "+s.truedom;else txt="⚖️ ฐานทางกฎหมายที่เกี่ยวข้อง: "+s.basis;
  document.getElementById("srcSlot").innerHTML='<div class="srcbox">'+txt+'</div>';}
/* ====== ANSWER FLOW ====== */
function evaluate(s,c,mech){
  if(mech==="b2"){const ok=c===s.an;return{ok:ok,err:ok?null:(c==="REAL"?"fn":"fp"),truth:s.an==="REAL"?"ของจริง (REAL)":"สื่อปลอม (DEEPFAKE)",lab:ok?null:(c==="REAL"?"เชื่อสื่อปลอม → ภัยลุกลาม":"กล่าวหาของจริงผิด")};}
  if(mech==="phish"){const truth=s.ph,bl=c==="BLOCK",ok=bl===truth;let err=null,lab=null;
    if(!ok){if(!bl&&truth){err="fn";lab="FALSE NEGATIVE — ภัยทะลุระบบ!";}else{err="fp";lab="FALSE POSITIVE — บล็อกของจริงเกินเหตุ";}}
    else lab=bl?"TRUE POSITIVE — สกัดภัยสำเร็จ":"TRUE NEGATIVE — ปล่อยของจริงถูก";
    return{ok:ok,err:err,truth:truth?"Phishing (ภัย)":"ปลอดภัย",lab:lab};}
  const ok=c===s.vd,nm={COMPLIANT:"ถูกต้องตามกฎหมาย",NEEDS_CONSENT:"ต้องขอความยินยอมก่อน",VIOLATION:"ละเมิด PDPA"};let err=null,lab=null;
  if(!ok){if(sevRank[c]<sevRank[s.vd]){err="fn";lab="ตัดสินผ่อนเกินไป → ข้อมูลเสี่ยงรั่ว";}else{err="fp";lab="ตัดสินเข้มเกินไป → กระทบความน่าเชื่อถือ";}}
  return{ok:ok,err:err,truth:nm[s.vd],lab:lab};}

function answer(c){if(state.answered||(state.screen!=="card"&&state.screen!=="boss"))return;state.answered=true;clearInterval(state.timerId);
  if(!state.inspect)state.inspectAll=false;const s=cur(),mech=curMech(),r=evaluate(s,c,mech);state.pending=r;
  if(r.ok){state.streak++;state.maxStreak=Math.max(state.maxStreak,state.streak);state.correct++;if(state.streak>=CONFIG.comboStep)award("combo");
    const mult=comboMult(),gain=Math.round((CONFIG.baseScore+Math.round(state.tLeft/CONFIG.bonusTimeDiv))*mult);state.score+=gain;
    state.safety=clamp(state.safety+CONFIG.healOnCorrect);state.trust=clamp(state.trust+CONFIG.healOnCorrect);
    sfx(state.streak>=2?"combo":"correct");if(mech!=="b2")state.citizens++;if(state.tLeft>30)award("speed");}
  else{state.streak=0;shake();if(r.err==="fn"){state.safety=clamp(state.safety-pen(CONFIG.pen.fn));if(mech==="phish")state.fnCount++;sfx(state.safety<=0?"breach":"wrong");}
    else{state.trust=clamp(state.trust-pen(CONFIG.pen.fp));sfx("wrong");}}
  state.lowMeter=Math.min(state.lowMeter,state.safety,state.trust);
  state.playLog.push({ti:cur().ti,choice:c,truth:r.truth,ok:r.ok,conf:state.confidence,time:CONFIG.time[state.diffKey]-state.tLeft,inspect:state.inspect,cross:state.crossed,hint:!state.noHint,evid:null,evidOk:null});
  evidLock(r,s);}

function timeoutAnswer(){if(state.answered)return;state.answered=true;clearInterval(state.timerId);state.streak=0;shake();
  state.safety=clamp(state.safety-pen(CONFIG.timeoutPen));state.lowMeter=Math.min(state.lowMeter,state.safety,state.trust);sfx(state.safety<=0?"breach":"wrong");
  const s=cur(),mech=curMech();const truth=mech==="b2"?(s.an==="REAL"?"ของจริง":"สื่อปลอม"):mech==="phish"?(s.ph?"Phishing":"ปลอดภัย"):({COMPLIANT:"ถูกต้อง",NEEDS_CONSENT:"ต้องขอ consent",VIOLATION:"ละเมิด"})[s.vd];
  state.pending={ok:false,err:"fn",truth:truth,lab:"หมดเวลา!"};feedback(s);}

function evidLock(r,s){state.screen="evidlock";
  app.innerHTML='<div class="topglow"></div><div class="lockwrap fade"><div class="kicker" style="color:'+(r.ok?"var(--green)":"var(--red)")+'">'+(r.ok?"ตัดสินถูก":"ตัดสินพลาด")+'</div>'
    +'<div class="lockq">🎯 หลักฐานชิ้นไหนชี้ขาด?</div><div class="locksub">เลือกเหตุผลที่ทำให้ตัดสินแบบนั้น (เลือกถูก = โบนัส)</div>'
    +'<div id="eopts">'+s.cl.map((c,i)=>'<button class="eopt" data-i="'+i+'" onclick="lockEvidence('+i+')"><span class="ek">'+(i+1)+'</span><span>'+c+'</span></button>').join("")+'</div></div>';}
function lockEvidence(i){const opts=document.querySelectorAll(".eopt");[].forEach.call(opts,o=>o.style.pointerEvents="none");const key=0;
  opts[i].classList.add(i===key?"right":"wrong");if(i!==key)opts[key].classList.add("right");
  if(i===key){state.reason++;state.score+=CONFIG.evidenceBonus;sfx("correct");const rc=opts[key].getBoundingClientRect();fxParticles(rc.left+rc.width/2,rc.top+rc.height/2,30,8);}else sfx("wrong");
  if(state.playLog.length){const last=state.playLog[state.playLog.length-1];last.evid=i;last.evidOk=i===key;}
  setTimeout(afterAnswer,900);}
function afterAnswer(){const r=state.pending,dead=state.safety<=0||state.trust<=0;
  if(!dead&&r&&!r.ok&&r.err==="fn"){const key="fn"+(isBoss()?(state.bossStage+1):state.lvl);if(CASCADE[key]){consequence(CASCADE[key]);return;}}
  feedback(cur());}

function consequence(cas){state.screen="cascade";state.cascData=cas;
  app.innerHTML='<div class="topglow"></div><div class="feedback fade"><div class="casc"><h3>⚠ '+cas.t+'</h3><p>'+cas.p+'</p>'
    +cas.o.map((o,i)=>'<button class="btn btn-ghost" style="text-align:left;margin-bottom:8px" onclick="mitigate('+i+','+o[1]+')">'+o[0]+'</button>').join("")+'</div></div>';}
function mitigate(i,good){const cas=state.cascData;if(good){state.safety=clamp(state.safety+10);toast("💪","แก้ไขถูกทาง! +10 ความปลอดภัย");}else toast("⚠️","ทำให้สถานการณ์แย่ลง");sfx(good?"correct":"wrong");
  app.innerHTML='<div class="topglow"></div><div class="feedback fade"><div class="fbv '+(good?"ok":"no")+'">'+(good?"✓ จัดการได้":"✗ พลาดอีกครั้ง")+'</div><div class="fbex" style="margin-top:10px"><b>// บทเรียนเรื่องผลพวง</b><br>'+cas.ex+'</div><button class="btn btn-main" onclick="feedback(cur())">ดูสรุป ›</button></div>';}

function feedback(s){state.screen="feedback";const r=state.pending,dead=state.safety<=0||state.trust<=0,last=curIdx()>=curLen()-1;
  app.innerHTML='<div class="topglow"></div><div class="feedback fade"><div class="fbv '+(r.ok?"ok":"no")+'">'+(r.ok?"✓ ถูกต้อง":"✗ ผิดพลาด")+'</div>'
    +(r.lab?'<div class="fbtruth">'+r.lab+'</div>':"")+'<div class="fbtruth">คำตอบที่ถูก: '+r.truth+'</div>'
    +'<div class="fbmeters"><span class="fbm" style="color:'+meterColor(state.safety)+'">🛡️ ปลอดภัย '+state.safety+'</span><span class="fbm" style="color:'+meterColor(state.trust)+'">🤝 น่าเชื่อถือ '+state.trust+'</span>'+(state.streak>1?'<span class="fbm" style="color:var(--amber)">🔥 Streak '+state.streak+'</span>':"")+'</div>'
    +'<div class="fbex"><b>// บทวิเคราะห์</b><br>'+s.ex+'</div>'
    +(dead?'<button class="btn btn-main" style="background:linear-gradient(135deg,var(--red),#c0304a);color:#fff" onclick="levelFail()">ดูผล ›</button>':'<button class="btn btn-main" onclick="'+(last?"levelDone()":"nextCard()")+'">'+(last?'จบด่าน › <span style=opacity:.6>[Enter]</span>':'ต่อไป › <span style=opacity:.6>[Enter]</span>')+'</button>')+'</div>';}
function nextCard(){if(isBoss())state.bossStage++;else state.idx++;loadCard();}

function levelDone(){state.screen="menu";const avg=Math.round((state.safety+state.trust)/2),rank=rankOf(avg);sfx("win");state.totalScore+=state.score;
  if(!state.ranks[state.lvl]||"FCBAS".indexOf(rank)>"FCBAS".indexOf(state.ranks[state.lvl]))state.ranks[state.lvl]=rank;
  if(state.lvl<3)state.unlocked[state.lvl+1]=true;if(state.ranks[1]&&state.ranks[2]&&state.ranks[3])state.unlocked[4]=true;
  if(state.correct===curLen())award("flawless");if(state.reason===curLen())award("reason");
  if(state.lvl===1&&rank==="S")award("eagle");if(state.lvl===2&&state.fnCount===0)award("gate");if(state.lvl===3&&rank==="S")award("privacy");
  if(state.lvl===4)award("boss");if(state.noHint)award("solo");if(state.tokens>0)award("frugal");
  if(state.maxStreak>=CONFIG.comboStep)award("combo");if(state.lowMeter<30&&avg>0)award("comeback");if(state.safety>=80&&state.trust>=80)award("balance");
  if(rank==="S"||state.lvl===4)confetti();const L=LV[state.lvl],next=state.lvl+1;
  app.innerHTML='<div class="topglow"></div><div class="end fade"><div class="kicker">'+(state.lvl===4?"Final":"Mission 0"+state.lvl)+' Report</div>'
    +'<div class="rankbig reveal" style="color:'+rankColor(rank)+';text-shadow:0 0 40px '+rankColor(rank)+'">'+rank+'</div><div class="endt" style="color:'+L.c+'">'+L.name+' CLEARED</div>'
    +'<div class="statgrid"><div class="stat pop"><div class="n">'+state.correct+'/'+curLen()+'</div><div class="l">ตอบถูก</div></div><div class="stat pop" style="animation-delay:.1s"><div class="n">'+state.reason+'/'+curLen()+'</div><div class="l">เหตุผลถูก</div></div><div class="stat pop" style="animation-delay:.2s"><div class="n">'+state.score+'</div><div class="l">คะแนน</div></div></div>'
    +'<div class="statgrid"><div class="stat"><div class="n" style="color:'+meterColor(state.safety)+'">'+state.safety+'</div><div class="l">🛡️ ปลอดภัย</div></div><div class="stat"><div class="n" style="color:'+meterColor(state.trust)+'">'+state.trust+'</div><div class="l">🤝 น่าเชื่อถือ</div></div><div class="stat"><div class="n">x'+state.maxStreak+'</div><div class="l">🔥 Streak สูงสุด</div></div></div>'
    +(state.lvl<4?'<button class="btn btn-main" onclick="'+(state.lvl<3?"lvlIntro("+next+")":"map()")+'">'+(state.lvl<3?"ไปด่าน "+next+" ›":(state.unlocked[4]?"ปลดล็อกด่านบอส! ›":"กลับแผนที่ ›"))+'</button><div style="height:9px"></div><button class="btn btn-ghost" onclick="map()">‹ แผนที่</button>':'<button class="btn btn-main" style="background:linear-gradient(135deg,var(--amber),#ff9628);color:#1a1000" onclick="certificate()">🎓 รับใบประกาศ ›</button>')+'</div>';
  saveProfile();}

function levelFail(){state.screen="menu";const L=LV[state.lvl],which=state.safety<=0?"🛡️ ความปลอดภัยหมด (ปล่อยภัยหลุดมากไป)":"🤝 ความน่าเชื่อถือหมด (กล่าวหา/บล็อกของจริงมากไป)";
  app.innerHTML='<div class="topglow"></div><div class="end fade"><div class="rankbig reveal" style="color:var(--red);text-shadow:0 0 40px var(--red)">F</div><div class="endt" style="color:var(--red)">MISSION FAILED</div>'
    +'<div class="glasscard"><p>'+which+'<br><br>บทเรียน: ต้อง <b>บาลานซ์</b> ทั้งสองด้าน — คิดวิเคราะห์โดยใช้ <b>หลักฐาน</b> ไม่ปล่อยปละ และไม่ระแวงเกินเหตุ ลองใช้ 🌐 ตรวจแหล่ง ให้คุ้ม token แล้วกลับมาใหม่!</p></div>'
    +'<button class="btn btn-main" onclick="initLevel('+state.lvl+')">↺ เล่นด่านนี้ใหม่</button><div style="height:9px"></div><button class="btn btn-ghost" onclick="map()">‹ แผนที่</button></div>';saveProfile();}

function certificate(){state.screen="menu";sfx("win");confetti();const av=["F","C","B","A","S"],keys=Object.keys(state.ranks),sc=Object.values(state.ranks).reduce((a,r)=>a+av.indexOf(r),0);const overall=keys.length?av[Math.round(sc/keys.length)]:"B";
  app.innerHTML='<div class="topglow"></div><div class="end fade"><div class="cert"><div class="seal">★ OBEC CYBER ACADEMY ★</div><div class="big">CYBER GUARDIAN<br>CERTIFIED</div>'
    +'<p style="font-size:.81rem;color:var(--dim);line-height:1.7">มอบให้ <b style="color:var(--txt)">'+state.player+'</b><br>ผู้พิชิตภารกิจรู้เท่าทันสื่อ ความปลอดภัยไซเบอร์ PDPA และด่านบอส</p>'
    +'<div style="font-family:var(--display);font-size:44px;font-weight:800;color:var(--amber);margin-top:12px;text-shadow:0 0 24px rgba(255,192,70,.5)">RANK '+overall+'</div></div>'
    +'<div class="statgrid"><div class="stat"><div class="n">'+(state.ranks[1]||"-")+'</div><div class="l">Deepfake</div></div><div class="stat"><div class="n">'+(state.ranks[2]||"-")+'</div><div class="l">Phishing</div></div><div class="stat"><div class="n">'+(state.ranks[3]||"-")+'</div><div class="l">PDPA</div></div></div>'
    +'<div class="statgrid"><div class="stat"><div class="n" style="color:var(--pink)">'+(state.ranks[4]||"-")+'</div><div class="l">👑 บอส</div></div><div class="stat"><div class="n">'+state.totalScore+'</div><div class="l">คะแนนรวม</div></div><div class="stat"><div class="n">'+state.badges.size+'</div><div class="l">เหรียญ</div></div></div>'
    +'<button class="btn btn-main" onclick="window.print()">🖨️ บันทึก / พิมพ์</button><div style="height:9px"></div>'
    +(state.postScore===null?'<button class="btn btn-ghost" onclick="startQuiz(\'post\')">📝 แบบทดสอบหลังเรียน</button><div style="height:9px"></div>':"")
    +'<button class="btn btn-ghost" onclick="leaderboard()">🏆 อันดับ</button></div>';saveProfile();}

function badgesScreen(){state.screen="menu";
  app.innerHTML='<div class="topglow"></div><div class="screen fade"><div class="kicker">Achievements</div><div class="logo gradtext" style="font-size:30px">🎖️ เหรียญตรา</div><div class="tagline">ปลดล็อก '+state.badges.size+' / '+BADGES.length+'</div>'

    +(lb.length?podium:"")+(lb.length?'<div class="stagger">'+rest.map((e,i)=>'<div class="lbrow '+(e.name===state.player?"me":"")+'"><div class="pos">'+(i<3?medal[i]:"#"+(i+1))+'</div><div><div class="nm">'+e.name+'</div><div class="meta">'+(e.badges||0)+' เหรียญ · Rank '+(e.rank||"-")+'</div></div><div style="flex:1"></div><div class="sc">'+e.score+'</div></div>').join("")+'</div>':'<div class="glasscard"><p>ยังไม่มีคะแนน — เล่นจบด่านแล้วชื่อคุณจะขึ้นที่นี่!</p></div>')
    +'<div style="height:12px"></div><div class="nav-tabs"><div class="tab" onclick="map()">‹ กลับ</div>'+(lb.length?'<div class="tab" onclick="clearLB()">🗑️ ล้าง</div>':"")+'</div></div>';}

/* ====== PERSIST + TIMER + KEYBOARD ====== */
function getLB(){try{return JSON.parse(localStorage.getItem("cg_lb")||"[]");}catch(e){return[];}}
function saveProfile(){try{let lb=getLB();const i=lb.findIndex(e=>e.name===state.player);const av=["F","C","B","A","S"],keys=Object.keys(state.ranks),sc=Object.values(state.ranks).reduce((a,r)=>a+av.indexOf(r),0),overall=keys.length?av[Math.round(sc/keys.length)]:"-";
  const entry={name:state.player,score:state.totalScore,badges:state.badges.size,rank:overall,date:Date.now()};
  if(i>=0){if(state.totalScore>=lb[i].score)lb[i]=entry;}else lb.push(entry);localStorage.setItem("cg_lb",JSON.stringify(lb));
  localStorage.setItem("cg_p_"+state.player,JSON.stringify({badges:[].slice.call(state.badges),ranks:state.ranks,score:state.totalScore,pre:state.preScore,post:state.postScore}));}catch(e){}}
function loadProfile(){try{const p=JSON.parse(localStorage.getItem("cg_p_"+state.player)||"null");if(p){state.badges=new Set(p.badges||[]);if(p.pre!=null)state.preScore=p.pre;if(p.post!=null)state.postScore=p.post;}}catch(e){}}
function clearLB(){if(confirm("ล้างกระดานคะแนน?")){localStorage.removeItem("cg_lb");leaderboard();}}
function startTimer(){clearInterval(state.timerId);state.timerId=setInterval(function(){state.tLeft--;const t=document.getElementById("timer");if(!t){clearInterval(state.timerId);return;}t.textContent="0:"+String(Math.max(0,state.tLeft)).padStart(2,"0");t.classList.toggle("low",state.tLeft<=10);if(state.tLeft<=0){clearInterval(state.timerId);timeoutAnswer();}},1000);}
document.addEventListener("keydown",function(e){const typing=e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA";
  if((state.screen==="card"||state.screen==="boss")&&!state.answered&&!typing){if(e.key==="i"||e.key==="I"){doInspect();return;}if(e.key==="c"||e.key==="C"){doCross();return;}const n=parseInt(e.key),mech=curMech();if(n>=1&&n<=mechBtn[mech].length)answer(mechBtn[mech][n-1][2]);}
  else if(state.screen==="evidlock"&&!typing){const n=parseInt(e.key),opts=app.querySelectorAll(".eopt");if(n>=1&&n<=opts.length&&opts[0]&&opts[0].style.pointerEvents!=="none")lockEvidence(n-1);}
  else if(state.screen==="feedback"&&e.key==="Enter"){const b=app.querySelector(".btn-main");if(b)b.click();}
  else if(state.screen==="quiz"&&!typing){const n=parseInt(e.key),opts=app.querySelectorAll(".qopt");if(n>=1&&n<=opts.length&&opts[0]&&opts[0].style.pointerEvents!=="none")answerQuiz(n-1);}});

  app.innerHTML='<div class="topglow"></div><div class="screen fade">'
    +'<div class="kicker">Learning Platform · v1.0</div><div class="logo gradtext">GUARDIAN<br>ACADEMY</div>'

function tbAnswer(i){var q=TEACHBACK[tbIdx],opts=document.querySelectorAll(".qopt");[].forEach.call(opts,function(o){o.style.pointerEvents="none";});
  opts[i].classList.add(i===q.a?"right":"wrong");if(i!==q.a)opts[q.a].classList.add("right");if(i===q.a){tbScore++;sfx("correct");}else sfx("wrong");
  setTimeout(function(){tbIdx++;if(tbIdx<TEACHBACK.length)tbQuestion();else tbResult();},1000);}
function tbResult(){state.teachScore=tbScore;saveProfile();if(tbScore===TEACHBACK.length)confetti();
  app.innerHTML='<div class="topglow"></div><div class="end fade"><div class="kicker">Teach-Back Complete</div><div class="rankbig reveal" style="color:var(--green)">'+tbScore+'/'+TEACHBACK.length+'</div><div class="endt">สอนเพื่อนได้!</div>'
    +'<div class="glasscard"><p>'+(tbScore>=4?'ยอดเยี่ยม! คุณอธิบายได้ถูกต้องเกือบหมด — <b>ถ้าสอนคนอื่นเข้าใจได้ แปลว่ารู้จริง</b> (Bloom ระดับสูงสุด)':tbScore>=3?"ดีมาก! ยังมีจุดที่ทบทวนได้ ลองเล่นเฟส 3 อีกครั้งแล้วกลับมาสอนใหม่":"ลองกลับไปเรียนในเฟส 2 แล้วมาสอนเพื่อนอีกครั้ง — ยิ่งสอนยิ่งเข้าใจ!")+'</p></div>'
    +'<button class="btn btn-main" onclick="reflect()">‹ กลับ Phase 4</button></div>';}

/* ====== PHASE 5: APPLY (placeholder + URL Scanner) ====== */
function applyPhase(){state.screen="menu";setAccent("255,107,214","#ff6bd6");
  app.innerHTML='<div class="topglow"></div><div class="screen fade"><div class="kicker">Phase 5: Apply</div><div class="logo gradtext" style="font-size:28px">🌍 ใช้ในชีวิตจริง</div>'
    +'<div class="glasscard"><h3>🔗 URL Scanner</h3><p>วาง URL ที่เจอในชีวิตจริง แล้วดูว่าน่าสงสัยไหม</p></div>'
    +'<input class="inp" id="scanUrl" placeholder="วาง URL ที่นี่ เช่น https://example.com">'
    +'<button class="btn btn-main" onclick="scanUrl()">🔍 วิเคราะห์ URL</button><div id="scanResult" style="margin-top:14px"></div>'
    +'<div class="glasscard" style="margin-top:18px"><h3>📅 Daily Challenge (Coming Soon)</h3><p>ทุกวันจะมีโจทย์ใหม่จากสถานการณ์จริง — กลับมาฝึกทุกวันเพื่อ Spaced Repetition!</p></div>'
    +'<button class="btn btn-ghost" onclick="academyHub()">‹ กลับ</button></div>';}
function scanUrl(){var url=(document.getElementById("scanUrl").value||"").trim(),out=document.getElementById("scanResult");if(!url){out.innerHTML='<div class="glasscard"><p>กรุณาวาง URL</p></div>';return;}
  var flags=[];try{var u=new URL(url);if(u.protocol==="http:")flags.push("⚠️ http:// ไม่เข้ารหัส (ควรเป็น https)");
    var host=u.hostname;if(/\d/.test(host.replace(/\./g,"")))flags.push("⚠️ domain มีตัวเลขปน — ตรวจว่าเป็น Typosquatting ไหม");
    var tld=host.split(".").pop();if(["xyz","top","click","buzz","loan","win"].indexOf(tld)>=0)flags.push("🔴 TLD ."+tld+" มักพบในเว็บหลอกลวง");
    if(host.indexOf("-")>=0)flags.push("⚠️ domain มีขีด (-) — อาจแอบอ้างเป็นเว็บอื่น");
    if(!flags.length)flags.push("✅ ไม่พบสัญญาณผิดปกติเบื้องต้น — แต่ยังควรตรวจ domain จริงด้วย Lateral Reading");}
  catch(e){flags.push("❌ URL ไม่ถูกรูปแบบ — ตรวจว่ามี https:// นำหน้า");}
  out.innerHTML='<div class="glasscard"><h3>ผลวิเคราะห์</h3><p>Domain: <b>'+url+'</b></p><p>'+flags.join("<br>")+'</p><p style="margin-top:8px;font-size:.72rem;color:var(--dim)">⚠️ นี่เป็นการวิเคราะห์เบื้องต้นเท่านั้น ควร Lateral Reading เพิ่มเติมเสมอ</p></div>';}

/* ====== Override map() to return to academyHub ====== */
var _origMap = map;
map = function(){_origMap();
  // Replace the boot button in nav-tabs with academyHub
  var tabs=app.querySelector(".nav-tabs");if(tabs){var btns=tabs.querySelectorAll(".tab");if(btns.length>=4)btns[3].setAttribute("onclick","academyHub()");btns[3].textContent="🏠 Academy";}};

/* ====== Override certificate to include academyHub link ====== */
var _origCert = certificate;
certificate = function(){_origCert();
  var node=document.createElement("div");node.style.marginTop="9px";node.innerHTML='<button class="btn btn-ghost" onclick="academyHub()">🏠 กลับ Academy Hub</button>';app.querySelector(".end").appendChild(node);};

/* ====== PERSISTENCE update for new fields ====== */
var _origSave = saveProfile;
saveProfile = function(){_origSave();try{var p=JSON.parse(localStorage.getItem("cg_p_"+state.player)||"{}");
  p.discoverDone=state.discoverDone;p.lessonsCompleted=[].slice.call(state.lessonsCompleted);p.teachScore=state.teachScore;p.playLog=state.playLog;
  localStorage.setItem("cg_p_"+state.player,JSON.stringify(p));}catch(e){}};
var _origLoad = loadProfile;
loadProfile = function(){_origLoad();try{var p=JSON.parse(localStorage.getItem("cg_p_"+state.player)||"null");
  if(p){if(p.discoverDone)state.discoverDone=true;if(p.lessonsCompleted)state.lessonsCompleted=new Set(p.lessonsCompleted);if(p.teachScore!=null)state.teachScore=p.teachScore;if(p.playLog)state.playLog=p.playLog;}}catch(e){}};

academy();
</script>
